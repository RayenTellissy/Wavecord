name = "wavecord"
main = "src/worker.ts"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

# Durable Object bindings — one per party type. The binding *names* (lowercased)
# are what `routePartykitRequest` matches against the URL path
# `/parties/<name>/<room>`, so MAIN → main, CHANNEL → channel, etc.
[[durable_objects.bindings]]
name = "MAIN"
class_name = "MainParty"

[[durable_objects.bindings]]
name = "CHANNEL"
class_name = "ChannelParty"

[[durable_objects.bindings]]
name = "DM"
class_name = "DmParty"

[[durable_objects.bindings]]
name = "USER"
class_name = "UserParty"

# DO migration — required when introducing new DO classes. SQLite-backed DOs
# are the default for new bindings and don't cost extra for our use case
# (we don't actually persist anything).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["MainParty", "ChannelParty", "DmParty", "UserParty"]

# Vars are non-secret; secrets (PARTYKIT_SECRET, NEXT_APP_URL) are pushed via
#   npx wrangler secret put PARTYKIT_SECRET
#   npx wrangler secret put NEXT_APP_URL
